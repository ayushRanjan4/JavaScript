<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>

</body>
<script>
    const body=document.querySelector('body');
    for(let i=1;i<51;i++){
        const bt=document.createElement('button');
        bt.innerHTML=`button ${i}`;
        const chose="0123456789ABCDEF";
        let color="#"
        for(let j=0;j<6;j++){
            color+=chose[parseInt(Math.random()*16)];
        }
        bt.style.backgroundColor=color;
        bt.style.padding="10px";
        bt.style.margin="5px";

        body.appendChild(bt);
    }
    const btn=body.querySelectorAll('button');
    btn.forEach((button)=>{
        button.addEventListener('click',function(e){
            body.style.backgroundColor=e.target.style.backgroundColor;
        })
    })

</script>
</html>
