<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="wrapper">

<h1>Number Guessing Game</h1>

<p class="instructions">
Try and guess a random number between <b>1 and 100</b>.
<br>
You have <b>10 attempts</b> to guess the correct number.
</p>

<form class="form">
<label for="guessField" id="guess">Guess a number</label>

<input 
type="number"
id="guessField"
class="guessField"
placeholder="Enter number">

<input
type="submit"
id="subt"
value="Submit Guess"
class="guessSubmit">
</form>

<div class="resultParas">

<p>Previous Guesses:
<span class="guesses"></span>
</p>

<p>Guesses Remaining:
<span class="lastResult">10</span>
</p>

<p class="lowOrHi"></p>

</div>

</div>

<script src="javascript.js"></script>
</body>
</html>
